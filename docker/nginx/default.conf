server {
    listen 8080;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    # Charset
    charset utf-8;

    # Logging
    access_log /var/www/html/storage/logs/nginx_access.log;
    error_log  /var/www/html/storage/logs/nginx_error.log;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Semua request diteruskan ke index.php (Laravel routing)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM handler
    location ~ \.php$ {
        fastcgi_pass            127.0.0.1:9000;
        fastcgi_index           index.php;
        fastcgi_param           SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include                 fastcgi_params;
        fastcgi_read_timeout    300;
        fastcgi_buffer_size     128k;
        fastcgi_buffers         8 256k;
    }

    # Aset statis: cache agresif
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
    }

    # Blok akses ke file dot (misal .env, .git)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Blok akses ke file PHP di storage
    location ~* /storage/.*\.php$ {
        deny all;
    }

    # Upload size
    client_max_body_size 20M;

    # Gzip
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_types        text/plain text/css text/xml text/javascript
                      application/json application/javascript application/xml
                      application/rss+xml font/woff2;
}
