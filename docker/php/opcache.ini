; ── OPcache untuk mempercepat PHP di production ───────────────────────────────

[opcache]
opcache.enable = 1
opcache.enable_cli = 0

; Memory untuk bytecode cache
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000

; Di production: matikan file stat check (lebih cepat)
; Di development: set ke 1 supaya perubahan langsung terdeteksi
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0

; Simpan compiled file di /tmp/opcache
opcache.file_cache = /tmp/opcache
opcache.file_cache_only = 0

opcache.fast_shutdown = 1
