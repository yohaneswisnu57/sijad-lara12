; ── PHP Settings untuk Production dalam Docker ────────────────────────────────

[PHP]
; Error handling — matikan display error di production
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
log_errors = On
error_log = /var/www/html/storage/logs/php_error.log

; Upload
upload_max_filesize = 20M
post_max_size = 25M
max_file_uploads = 20

; Memory & waktu eksekusi
memory_limit = 256M
max_execution_time = 120
max_input_time = 120

; Session
session.gc_maxlifetime = 7200

; Timezone
date.timezone = Asia/Makassar
