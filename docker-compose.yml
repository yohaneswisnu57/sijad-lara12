services:

  # ─── Aplikasi Laravel (PHP-FPM + Nginx) ───────────────────────────────────
  # DB tidak di-container karena sudah ada di server eksternal (202.46.29.x)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sijad_app
    restart: unless-stopped
    env_file:
      - .env.docker          # Copy dari .env, sesuaikan APP_ENV & APP_DEBUG
    volumes:
      # Storage Laravel: file SK Mengajar dan upload lainnya (persistent)
      - storage_private:/var/www/html/storage/app/private
      - storage_public:/var/www/html/storage/app/public
      - app_logs:/var/www/html/storage/logs
    ports:
      - "${APP_PORT:-80}:8080"   # Nginx listen 8080 internal (non-privileged)
    sysctls:
      # Izinkan container bind ke port >= 80 tanpa root privilege
      net.ipv4.ip_unprivileged_port_start: "0"
    security_opt:
      # Hapus batasan no-new-privileges agar runc bisa init dengan benar
      - no-new-privileges:false
    networks:
      - sijad_network

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  storage_private:
    name: sijad_storage_private
  storage_public:
    name: sijad_storage_public
  app_logs:
    name: sijad_app_logs

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  sijad_network:
    name: sijad_network
    driver: bridge
